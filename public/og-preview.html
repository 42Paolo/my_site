<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1200px; height:630px; overflow:hidden; background:#000; }
  .wrap { position:relative; width:1200px; height:630px; overflow:hidden; }
  canvas { position:absolute; inset:0; display:block; }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    gap: 18px;
  }

  .brand {
    font-family: 'Satoshi', sans-serif;
    font-weight: 700;
    font-size: 112px;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .pa    { color: #C2E812; }
  .brogi { color: #ffffff; }

  .tagline {
    font-family: 'Satoshi', sans-serif;
    font-weight: 300;
    font-size: 15px;
    letter-spacing: 0.30em;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="wrap">
  <canvas id="c" width="1200" height="630"></canvas>

  <div class="overlay">
    <div class="brand">
      <span class="pa">pa</span><span class="brogi">brogi</span>
    </div>
    <div class="tagline">web developer &nbsp;·&nbsp; firenze</div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 1200, H = 630;
const rng = (min, max) => Math.random() * (max - min) + min;

// ── Base background ──────────────────────────────────────────
ctx.fillStyle = '#04090F';
ctx.fillRect(0, 0, W, H);

// ── Milky Way nebula band ────────────────────────────────────
// Diagonal band from bottom-left to top-right, like the reference photo
function nebulaPatch(x, y, w, h, r, g, b, a) {
  const grad = ctx.createRadialGradient(x, y, 0, x, y, Math.max(w, h));
  grad.addColorStop(0,   `rgba(${r},${g},${b},${a})`);
  grad.addColorStop(0.4, `rgba(${r},${g},${b},${a * 0.4})`);
  grad.addColorStop(1,   'transparent');
  ctx.save();
  ctx.scale(w / Math.max(w, h), h / Math.max(w, h));
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x / (w / Math.max(w, h)), y / (h / Math.max(w, h)), Math.max(w, h), 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// Main nebula band (diagonal, bottom-left → top-right)
const patches = [
  { x: 100,  y: 420, w: 320, h: 180, r: 60,  g: 90,  b: 140, a: 0.18 },
  { x: 280,  y: 350, w: 280, h: 160, r: 70,  g: 100, b: 155, a: 0.22 },
  { x: 450,  y: 290, w: 260, h: 150, r: 80,  g: 115, b: 165, a: 0.20 },
  { x: 560,  y: 250, w: 200, h: 130, r: 100, g: 140, b: 190, a: 0.28 }, // bright center
  { x: 650,  y: 220, w: 220, h: 130, r: 90,  g: 130, b: 180, a: 0.22 },
  { x: 800,  y: 200, w: 240, h: 140, r: 65,  g: 95,  b: 145, a: 0.18 },
  { x: 960,  y: 190, w: 260, h: 150, r: 55,  g: 80,  b: 130, a: 0.14 },
  { x: 1100, y: 210, w: 220, h: 130, r: 50,  g: 75,  b: 120, a: 0.12 },
  // Lower fill patches
  { x: 200,  y: 480, w: 300, h: 160, r: 40,  g: 60,  b: 100, a: 0.10 },
  { x: 500,  y: 400, w: 280, h: 140, r: 50,  g: 70,  b: 115, a: 0.12 },
  { x: 800,  y: 350, w: 260, h: 130, r: 45,  g: 65,  b: 105, a: 0.09 },
];

patches.forEach(p => {
  const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, Math.max(p.w, p.h));
  grad.addColorStop(0,    `rgba(${p.r},${p.g},${p.b},${p.a})`);
  grad.addColorStop(0.45, `rgba(${p.r},${p.g},${p.b},${p.a * 0.35})`);
  grad.addColorStop(1,    'transparent');
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.scale(p.w / Math.max(p.w, p.h), p.h / Math.max(p.w, p.h));
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(0, 0, Math.max(p.w, p.h), 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
});

// ── Stars ────────────────────────────────────────────────────
// Layer 1: tiny dim background stars
ctx.save();
for (let i = 0; i < 1400; i++) {
  const x = rng(0, W);
  const y = rng(0, H);
  const r = rng(0.2, 0.8);
  const a = rng(0.08, 0.45);
  ctx.globalAlpha = a;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
}
ctx.restore();

// Layer 2: medium stars
ctx.save();
for (let i = 0; i < 300; i++) {
  const x = rng(0, W);
  const y = rng(0, H);
  const r = rng(0.5, 1.2);
  const a = rng(0.3, 0.75);
  // slight blue tint for some
  const tint = Math.random() > 0.7 ? `rgba(180,210,255,${a})` : `rgba(255,255,255,${a})`;
  ctx.globalAlpha = 1;
  ctx.fillStyle = tint;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
}
ctx.restore();

// Layer 3: bright stars with glow
ctx.save();
const brightStars = Array.from({length: 55}, () => ({
  x: rng(0, W), y: rng(0, H),
  r: rng(1.0, 2.2),
  a: rng(0.7, 1.0),
}));
brightStars.forEach(s => {
  // Glow halo
  const glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 5);
  glow.addColorStop(0,   `rgba(255,255,255,${s.a * 0.6})`);
  glow.addColorStop(0.3, `rgba(200,225,255,${s.a * 0.2})`);
  glow.addColorStop(1,   'transparent');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(s.x, s.y, s.r * 5, 0, Math.PI * 2);
  ctx.fill();
  // Core
  ctx.globalAlpha = s.a;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
  ctx.fill();
});
ctx.restore();

// ── Vignette ─────────────────────────────────────────────────
const vig = ctx.createRadialGradient(W/2, H/2, 160, W/2, H/2, W * 0.78);
vig.addColorStop(0,   'transparent');
vig.addColorStop(0.7, 'rgba(0,0,0,0.25)');
vig.addColorStop(1,   'rgba(0,0,0,0.72)');
ctx.fillStyle = vig;
ctx.fillRect(0, 0, W, H);

// ── Extra dark center-bottom (so text is readable) ───────────
const textShield = ctx.createRadialGradient(W/2, H/2 + 30, 0, W/2, H/2 + 30, 380);
textShield.addColorStop(0,   'rgba(0,0,0,0.35)');
textShield.addColorStop(0.6, 'rgba(0,0,0,0.15)');
textShield.addColorStop(1,   'transparent');
ctx.fillStyle = textShield;
ctx.fillRect(0, 0, W, H);
</script>
</body>
</html>
