<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#040C0A"/>
      <stop offset="55%" stop-color="#0A1C14"/>
      <stop offset="100%" stop-color="#122A18"/>
    </linearGradient>
    <linearGradient id="horizon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4963A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D4963A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="goldH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9A6A20" stop-opacity="0"/>
      <stop offset="50%" stop-color="#D4963A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#9A6A20" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="72%" cy="18%" r="15%">
      <stop offset="0%" stop-color="#D4A850" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#D4A850" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#D4A850" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="horizonGlow" cx="50%" cy="68%" r="35%">
      <stop offset="0%" stop-color="#D4963A" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#D4963A" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowBlur">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="skyClip">
      <rect width="800" height="600"/>
    </clipPath>
  </defs>

  <!-- Sky gradient -->
  <rect width="800" height="600" fill="url(#sky)"/>
  <!-- Moon glow -->
  <ellipse cx="576" cy="108" rx="120" ry="100" fill="url(#moonGlow)" filter="url(#glowBlur)"/>
  <!-- Horizon warm glow -->
  <ellipse cx="400" cy="408" rx="360" ry="140" fill="url(#horizonGlow)"/>

  <!-- Stars -->
  <g fill="#E8D4A0">
    <circle cx="68" cy="42" r="1" opacity="0.8"/>
    <circle cx="145" cy="68" r="0.8" opacity="0.6"/>
    <circle cx="210" cy="30" r="1.2" opacity="0.7"/>
    <circle cx="298" cy="55" r="0.8" opacity="0.5"/>
    <circle cx="342" cy="22" r="1" opacity="0.6"/>
    <circle cx="410" cy="48" r="0.7" opacity="0.4"/>
    <circle cx="478" cy="18" r="1" opacity="0.7"/>
    <circle cx="534" cy="62" r="0.8" opacity="0.5"/>
    <circle cx="618" cy="38" r="1" opacity="0.6"/>
    <circle cx="692" cy="58" r="0.8" opacity="0.7"/>
    <circle cx="742" cy="28" r="1.2" opacity="0.5"/>
    <circle cx="120" cy="95" r="0.7" opacity="0.4"/>
    <circle cx="260" cy="80" r="0.8" opacity="0.5"/>
    <circle cx="380" cy="72" r="0.7" opacity="0.3"/>
    <circle cx="510" cy="88" r="0.8" opacity="0.4"/>
    <circle cx="660" cy="90" r="0.7" opacity="0.5"/>
    <!-- Bright star -->
    <circle cx="576" cy="42" r="1.8" opacity="0.9"/>
    <circle cx="576" cy="42" r="3" opacity="0.3" fill="#FFEAAA"/>
  </g>

  <!-- Moon -->
  <circle cx="576" cy="108" r="18" fill="#EDD898" opacity="0.85"/>
  <circle cx="582" cy="104" r="14" fill="#D4B860" opacity="0.2"/>

  <!-- Hills silhouette (far, dark green, low) -->
  <path d="M0,420 Q100,380 200,395 Q320,370 440,385 Q560,365 680,388 Q740,395 800,380 L800,600 L0,600 Z"
    fill="#0D2016" opacity="0.9"/>

  <!-- Rolling hills (mid) -->
  <path d="M0,450 Q80,420 160,438 Q280,410 380,428 Q480,408 580,425 Q680,415 800,430 L800,600 L0,600 Z"
    fill="#102818" opacity="0.95"/>

  <!-- Ground plane -->
  <path d="M0,480 Q200,462 400,470 Q600,462 800,472 L800,600 L0,600 Z"
    fill="#142C1A"/>

  <!-- Horizon warm light strip -->
  <rect x="0" y="406" width="800" height="6" fill="url(#goldH)" opacity="0.35"/>

  <!-- Cypress trees silhouette row -->
  <g fill="#0C1E0E">
    <!-- 7 cypress trees of varying heights -->
    <ellipse cx="168" cy="390" rx="12" ry="72" opacity="0.95"/>
    <ellipse cx="200" cy="398" rx="10" ry="58" opacity="0.9"/>
    <ellipse cx="228" cy="386" rx="13" ry="80" opacity="0.95"/>
    <ellipse cx="258" cy="394" rx="10" ry="62" opacity="0.9"/>
    <ellipse cx="285" cy="382" rx="12" ry="88" opacity="0.95"/>
    <ellipse cx="314" cy="392" rx="9" ry="60" opacity="0.9"/>
    <ellipse cx="340" cy="388" rx="11" ry="70" opacity="0.95"/>
  </g>
  <!-- Same dark shade overlaid to sharpen -->
  <g fill="#081408" opacity="0.5">
    <ellipse cx="168" cy="400" rx="9" ry="62"/>
    <ellipse cx="228" cy="398" rx="9" ry="68"/>
    <ellipse cx="285" cy="392" rx="8" ry="76"/>
    <ellipse cx="340" cy="398" rx="8" ry="60"/>
  </g>

  <!-- Villa facade (right side) -->
  <g opacity="0.8">
    <!-- Main building body -->
    <rect x="484" y="330" width="196" height="140" fill="#122018"/>
    <!-- Roof line -->
    <polygon points="476,330 588,298 688,330" fill="#0C1A10"/>
    <!-- Windows lit up (warm glow) -->
    <rect x="504" y="354" width="28" height="36" rx="2" fill="#E8B060" opacity="0.5"/>
    <rect x="548" y="354" width="28" height="36" rx="2" fill="#E8B060" opacity="0.35"/>
    <rect x="592" y="354" width="28" height="36" rx="2" fill="#E8B060" opacity="0.55"/>
    <rect x="636" y="354" width="28" height="36" rx="2" fill="#E8B060" opacity="0.3"/>
    <!-- Door -->
    <rect x="568" y="400" width="40" height="70" rx="3" fill="#E8B060" opacity="0.2"/>
    <!-- Door arch -->
    <path d="M568,400 Q588,380 608,400" fill="none" stroke="#D4963A" stroke-width="1" opacity="0.4"/>
    <!-- Window glow halos -->
    <rect x="504" y="354" width="28" height="36" rx="2" fill="#E8B060" opacity="0.15" filter="url(#glowBlur)"/>
  </g>

  <!-- Text panel - title -->
  <text x="136" y="516"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="13"
    fill="#D4A850"
    text-anchor="start"
    letter-spacing="7"
    font-weight="300"
    opacity="0.7">VILLA</text>

  <text x="136" y="554"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="40"
    fill="#EDD8A0"
    text-anchor="start"
    letter-spacing="3"
    font-weight="400">LE FONTANELLE</text>

  <!-- Thin gold rule above text -->
  <rect x="136" y="498" width="380" height="0.6" fill="url(#goldH)" opacity="0.4"/>

  <!-- Tagline -->
  <text x="136" y="576"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="9"
    fill="#D4963A"
    text-anchor="start"
    letter-spacing="4"
    opacity="0.6">HOTEL · BOOKING · FIRENZE · 2024</text>

  <!-- Corner details -->
  <polyline points="44,84 44,44 84,44" fill="none" stroke="#D4963A" stroke-width="1" opacity="0.4"/>
  <polyline points="756,84 756,44 716,44" fill="none" stroke="#D4963A" stroke-width="1" opacity="0.4"/>

  <!-- Credit -->
  <text x="748" y="592"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="7.5"
    fill="#D4963A"
    text-anchor="end"
    letter-spacing="3"
    opacity="0.2">PABROGI.COM</text>
</svg>
